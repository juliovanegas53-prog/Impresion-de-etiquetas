<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gestión de usuarios - Sistema de Etiquetas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
  <a class="skip-link" href="#contenido">Saltar al contenido principal</a>
  <nav class="navbar navbar-expand-lg app-navbar" aria-label="Navegación principal">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">Sistema de Etiquetas</a>
      <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#menu" aria-controls="menu" aria-expanded="false" aria-label="Abrir menú de navegación">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="menu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
          <li class="nav-item"><a class="nav-link" href="impresion.html">Impresión</a></li>
          <li class="nav-item"><a class="nav-link active" aria-current="page" href="usuarios.html">Usuarios</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main id="contenido" class="app-shell">
    <section class="app-card app-card-lg" aria-labelledby="tituloUsuarios">
      <h1 id="tituloUsuarios" class="app-title">Gestión de usuarios</h1>
      <p class="app-subtitle">Registro de datos básicos del usuario del sistema.</p>
      <form class="needs-validation" novalidate>
        <div class="row g-3">
          <div class="col-md-6">
            <label for="nombres" class="form-label">Nombres</label>
            <input type="text" id="nombres" class="form-control" placeholder="Digite nombres" required>
            <div class="invalid-feedback">Ingrese los nombres.</div>
          </div>
          <div class="col-md-6">
            <label for="apellidos" class="form-label">Apellidos</label>
            <input type="text" id="apellidos" class="form-control" placeholder="Digite apellidos" required>
            <div class="invalid-feedback">Ingrese los apellidos.</div>
          </div>
          <div class="col-md-6">
            <label for="cedula" class="form-label">Cédula</label>
            <input type="text" id="cedula" class="form-control" inputmode="numeric" placeholder="Digite cédula" required>
            <div class="invalid-feedback">Ingrese la cédula.</div>
          </div>
          <div class="col-md-6">
            <label for="fechaNacimiento" class="form-label">Fecha de nacimiento</label>
            <input type="date" id="fechaNacimiento" class="form-control" required>
            <div class="invalid-feedback">Seleccione la fecha de nacimiento.</div>
          </div>
          <div class="col-md-6">
            <label for="rol" class="form-label">Rol</label>
            <select id="rol" class="form-select" required>
              <option value="">Seleccione rol</option>
              <option>Cliente</option>
              <option>Administrador</option>
            </select>
            <div class="invalid-feedback">Seleccione un rol.</div>
          </div>
        </div>
        <div class="d-grid d-sm-flex gap-2 mt-4">
          <button type="submit" class="btn btn-primary">Guardar usuario</button>
          <button type="reset" class="btn btn-outline-secondary">Limpiar</button>
        </div>
      </form>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/app.js"></script>
</body>
</html>
