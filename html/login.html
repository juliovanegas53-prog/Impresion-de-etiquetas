<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Inicio de sesión - Sistema de Etiquetas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
  <a class="skip-link" href="#contenido">Saltar al contenido principal</a>
  <nav class="navbar app-navbar">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">Sistema de Etiquetas</a>
    </div>
  </nav>

  <main id="contenido" class="app-shell">
    <section class="app-card" aria-labelledby="tituloLogin">
      <h1 id="tituloLogin" class="app-title">Iniciar sesión</h1>
      <p class="app-subtitle">Valide su autenticidad para acceder al sistema.</p>
      <form class="needs-validation" novalidate>
        <div class="mb-3">
          <label for="usuario" class="form-label">Usuario o correo</label>
          <input type="email" class="form-control" id="usuario" name="usuario" autocomplete="username" placeholder="usuario@empresa.com" required>
          <div class="invalid-feedback">Ingrese un usuario o correo válido.</div>
        </div>
        <div class="mb-3">
          <label for="contrasena" class="form-label">Contraseña</label>
          <input type="password" class="form-control" id="contrasena" name="contrasena" autocomplete="current-password" placeholder="Digite su contraseña" required minlength="6">
          <div class="invalid-feedback">La contraseña debe tener al menos 6 caracteres.</div>
        </div>
        <button type="submit" class="btn btn-primary w-100">Ingresar</button>
      </form>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/app.js"></script>
</body>
</html>
